<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F0524"/>
      <stop offset="100%" stop-color="#020010"/>
    </radialGradient>

    <!-- Text Glow -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#7b2cbf"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .background {
      fill: url(#bg);
    }
    
    .title {
      font-family: 'Outfit', 'Segoe UI', sans-serif;
      font-size: 58px;
      font-weight: 800;
      fill: url(#text-gradient);
      text-anchor: middle;
      dominant-baseline: middle;
      animation: pulse-glow 3s infinite alternate ease-in-out, float-title 4s infinite alternate ease-in-out;
    }
    
    .subtitle {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 20px;
      font-weight: 400;
      fill: #94a3b8;
      text-anchor: middle;
      animation: floating 6s infinite alternate ease-in-out;
    }

    /* Animated Cyber Orbs */
    .orb-1 {
      fill: #7b2cbf;
      opacity: 0.3;
      filter: blur(30px);
      animation: orbit1 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .orb-2 {
      fill: #00f3ff;
      opacity: 0.2;
      filter: blur(25px);
      animation: orbit2 8s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .orb-3 {
      fill: #ff006e;
      opacity: 0.15;
      filter: blur(40px);
      animation: orbit3 12s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 10px rgba(123, 44, 191, 0.3)); transform: scale(0.98); }
      100% { filter: drop-shadow(0 0 35px rgba(0, 243, 255, 0.6)); transform: scale(1.02); }
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-8px); filter: drop-shadow(0 0 5px rgba(148, 163, 184, 0.4)); }
    }

    @keyframes orbit1 {
      0% { transform: translate(-100px, -50px) scale(0.8); }
      100% { transform: translate(200px, 50px) scale(1.2); }
    }

    @keyframes orbit2 {
      0% { transform: translate(800px, 150px) scale(1.5); }
      100% { transform: translate(500px, -20px) scale(0.9); }
    }

    @keyframes orbit3 {
      0% { transform: translate(400px, 200px); }
      100% { transform: translate(-50px, -80px); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="200" rx="15" ry="15" class="background" />

  <!-- Animated Glowing Orbs -->
  <circle cx="100" cy="50" r="100" class="orb-1" />
  <circle cx="700" cy="150" r="80" class="orb-2" />
  <circle cx="400" cy="180" r="120" class="orb-3" />

  <!-- Content -->
  <text x="400" y="85" class="title" style="transform-origin: 400px 85px;">
    Farhan Shaikh
  </text>
  
  <text x="400" y="150" class="subtitle">
    🚀 Building AI agents, web apps, &amp; experimental tech
  </text>
  
  <rect width="800" height="200" rx="15" ry="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
</svg>
