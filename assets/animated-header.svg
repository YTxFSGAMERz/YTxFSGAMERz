<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200"><defs><radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0F0524"/><stop offset="100%" stop-color="#020010"/></radialGradient><linearGradient id="text-gradient" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#fff"/><stop offset="50%" stop-color="#a5b4fc"/><stop offset="100%" stop-color="#7b2cbf"/></linearGradient><filter id="neon-glow" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur in="SourceGraphic" result="blur1" stdDeviation="8"/><feGaussianBlur in="SourceGraphic" result="blur2" stdDeviation="20"/><feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><style>@keyframes pulse-glow{0%{filter:drop-shadow(0 0 10px rgba(123,44,191,.3));transform:scale(.98)}}@keyframes floating{0%{transform:translateY(0)}}@keyframes orbit1{0%{transform:translate(-100px,-50px) scale(.8)}}@keyframes orbit2{0%{transform:translate(800px,150px) scale(1.5)}}@keyframes orbit3{0%{transform:translate(400px,200px)}}.background{fill:url(#bg)}.subtitle,.title{text-anchor:middle}.title{font-family:&apos;Outfit&apos;,&apos;Segoe UI&apos;,sans-serif;font-size:58px;font-weight:800;fill:url(#text-gradient);dominant-baseline:middle;animation:pulse-glow 3s infinite alternate ease-in-out,float-title 4s infinite alternate ease-in-out}.subtitle{font-family:&apos;Inter&apos;,&apos;Segoe UI&apos;,sans-serif;font-size:20px;font-weight:400;fill:#94a3b8;animation:floating 6s infinite alternate ease-in-out}.orb-1{fill:#7b2cbf;opacity:.3;filter:blur(30px);animation:orbit1 10s infinite alternate cubic-bezier(.4,0,.2,1)}.orb-2{fill:#00f3ff;opacity:.2;filter:blur(25px);animation:orbit2 8s infinite alternate cubic-bezier(.4,0,.2,1)}.orb-3{fill:#ff006e;opacity:.15;filter:blur(40px);animation:orbit3 12s infinite alternate cubic-bezier(.4,0,.2,1)}</style><rect width="800" height="200" class="background" rx="15" ry="15"/><circle cx="100" cy="50" r="100" class="orb-1"/><circle cx="700" cy="150" r="80" class="orb-2"/><circle cx="400" cy="180" r="120" class="orb-3"/><text style="transform-origin:400px 85px" x="400" y="85" class="title">Farhan Shaikh</text><text x="400" y="150" class="subtitle">🚀 Building AI agents, web apps, &amp; experimental tech</text><rect width="800" height="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" rx="15" ry="15"/></svg>